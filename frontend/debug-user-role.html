<!DOCTYPE html>
<html>
<head>
    <title>Debug User Role</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>Debug User Role</h1>
    <button onclick="checkUserRole()">Check Current User Role</button>
    <button onclick="fixUserRole()">Fix User Role to Talent</button>
    <div id="result"></div>

    <script>
        async function checkUserRole() {
            const resultDiv = document.getElementById('result');
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
            
            if (!token) {
                resultDiv.innerHTML = '<div class="result error">No token found. Please login first.</div>';
                return;
            }

            try {
                // Check stored user data
                const user = userStr ? JSON.parse(userStr) : null;
                resultDiv.innerHTML = `
                    <div class="result">
                        <h3>Stored User Data:</h3>
                        <pre>${JSON.stringify(user, null, 2)}</pre>
                    </div>
                `;

                // Check with backend
                const response = await fetch('/api/debug/current-user', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML += `
                        <div class="result success">
                            <h3>Backend User Data:</h3>
                            <pre>${JSON.stringify(data, null, 2)}</pre>
                        </div>
                    `;
                } else {
                    const error = await response.json();
                    resultDiv.innerHTML += `
                        <div class="result error">
                            <h3>Backend Error:</h3>
                            <pre>${JSON.stringify(error, null, 2)}</pre>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML += `
                    <div class="result error">
                        <h3>Request Error:</h3>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        }

        async function fixUserRole() {
            const resultDiv = document.getElementById('result');
            const token = localStorage.getItem('token');
            
            if (!token) {
                resultDiv.innerHTML = '<div class="result error">No token found. Please login first.</div>';
                return;
            }

            try {
                // Update user role in localStorage
                const userStr = localStorage.getItem('user');
                if (userStr) {
                    const user = JSON.parse(userStr);
                    user.role = 'talent';
                    localStorage.setItem('user', JSON.stringify(user));
                    resultDiv.innerHTML = '<div class="result success">User role updated to "talent" in localStorage. Please refresh the page and try applying again.</div>';
                } else {
                    resultDiv.innerHTML = '<div class="result error">No user data found in localStorage.</div>';
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="result error">
                        <h3>Error:</h3>
                        <pre>${error.message}</pre>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
